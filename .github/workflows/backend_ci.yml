name: Backend continuous integration

on:
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    test_job:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Setup python
              uses: actions/setup-python@v6
              with:
                python-version: "3.10"
            - name: Install dependecies
              run: |
                cd starter/backend
                pip install pipenv
                pipenv install
                pipenv run test
    lint_job:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Setup python
              uses: actions/setup-python@v6
              with:
                python-version: "3.10"
                cache: 'pipenv'
                cache-dependency-path: 'starter/backend/Pipfile.lock'

            - name: Running the lint
              run: |
                cd starter/backend
                pip install pipenv
                pipenv install --dev
                pipenv run lint

    build_job:
        needs: [test_job, lint_job]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Setup python
              uses: actions/setup-python@v6
              with:
                python-version: "3.10"
            - name: Build and run
              run:
                cd starter/backend
                pip install pipenv
                pipenv install
                pipenv run serve

