name: Frontend Continuous Integration

on:
    pull_request:
        branches: [main]
    workflow_dispatch:

jobs:
    test_job:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Setup Node JS
              uses: actions/setup-node@v4
              with:
                node-version: latest
                #cache: npm
                #cache-dependency-path: starter/frontend/package-lock.json
            - name: Install dependencies
              run: |
                cd starter/frontend
                npm ci
            - name: Run the tests
              run: |
                cd starter/frontend
                npm test
    lint_job:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Setup Node JS
              uses: actions/setup-node@v4
              with:
                node-version: latest
                cache: npm
                cache-dependency-path: starter/frontend/package-lock.json
            - name: Install dependencies
              run: |
                cd starter/frontend
                npm ci
            - name: Run the lint job
              run: |
                cd starter/frontend
                npm run lint -- --fix

    build_job:
        needs: [lint_job, test_job]
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v5
            - name: Build image
              run: |
                docker build --build-arg=REACT_APP_MOVIE_API_URL=http://localhost:5000 --tag=mp-frontend:latest .
                docker run --name mp-frontend -p 3000:3000 -d mp-frontend


